services:
  backend:
    build:
      context: ./backend
      target: dev
    container_name: cortex-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override DB_HOST to point at the compose postgres service
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-cortex}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      # Note: DB_PASSWORD must not contain URL-special characters (@, :, /, %)
      VECTOR_DB_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-cortex}
      GRAPH_DATABASE_PROVIDER: kuzu
      GRAPH_DATASET_DATABASE_HANDLER: kuzu
      SYSTEM_ROOT_DIRECTORY: /app/.cognee_system
      ENABLE_BACKEND_ACCESS_CONTROL: "false"
    volumes:
      - ./backend:/app
      - /app/.venv
      - cognee-data:/app/.cognee_system
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: cortex-postgres
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-cortex}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  cognee-data:

networks:
  default:
    name: cortex-network
